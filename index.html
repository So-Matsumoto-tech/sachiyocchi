<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>さちよっち</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=DotGothic16&display=swap');
  :root{
    --shell-1:#2a2a2a; --shell-2:#1a1a1a; --shell-edge:#000000;
    --screen-bg:#d0d0d0; --screen-bg2:#b8b8b8; --screen-line:#555555;
    --ink:#111111; --btn:#e0e0e0; --btn-edge:#888888; --gold:#cccccc;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Mochiy Pop P One', sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:20px;
    background:#ffffff;
    overflow-x:hidden;
  }
  .deco{position:fixed; font-size:24px; opacity:.5; pointer-events:none; animation:float 6s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-14px) rotate(8deg);}}
  .device-wrapper{display:inline-flex; flex-direction:column; align-items:center;}
  .device{
    position:relative; width:320px;
    background:linear-gradient(160deg,var(--shell-1),var(--shell-2));
    border-radius:50%;
    padding:52px 44px 36px;
    box-shadow:inset 0 6px 14px rgba(255,255,255,.55), inset 0 -10px 20px rgba(0,0,0,.18), 0 18px 40px rgba(200,120,30,.45);
    border:3px solid var(--shell-edge);
    overflow:hidden;
    aspect-ratio:4/5;
  }
  .device::before{content:"さちよっち"; position:absolute; top:12px; left:50%; transform:translateX(-50%); font-size:13px; color:#ffffff; letter-spacing:3px; text-shadow:0 0 8px #fff, 0 1px 0 #000;}
  .antenna{position:absolute; top:-26px; left:50%; transform:translateX(-50%); width:8px; height:30px; background:var(--shell-edge); border-radius:4px;}
  .antenna::after{content:""; position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:16px; height:16px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffffff, #aaaaaa); box-shadow:0 0 12px #fff, 0 0 20px #888; animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
  .bezel{background:#000000; border-radius:12px; padding:8px; box-shadow:inset 0 4px 10px rgba(0,0,0,.9); margin-top:4px;}
  .screen{position:relative; background:linear-gradient(180deg,var(--screen-bg),var(--screen-bg2)); border-radius:8px; height:180px; overflow:hidden; font-family:'DotGothic16', monospace; color:var(--ink); box-shadow:inset 0 0 0 2px #93b06a;}
  .screen::after{content:""; position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);}
  .stats{display:flex; gap:6px; padding:6px 8px 0; font-size:9px; line-height:1;}
  .stat{flex:1;}
  .stat .lbl{display:flex; justify-content:space-between; margin-bottom:2px;}
  .bar{height:7px; background:#9bb573; border:1px solid var(--screen-line); border-radius:2px; overflow:hidden;}
  .bar > span{display:block; height:100%; background:var(--ink); transition:width .4s ease, background .3s;}
  .bar.warn > span{background:#c0392b; animation:warnflash .6s steps(2) infinite;}
  @keyframes warnflash{50%{opacity:.3;}}
  .stage-tag{text-align:center; font-size:9px; margin-top:4px; color:var(--screen-line); letter-spacing:1px;}
  .stage{position:relative; height:108px; display:flex; align-items:flex-end; justify-content:center; overflow:hidden; padding-bottom:18px;}
  .floor{position:absolute; bottom:18px; left:14px; right:14px; height:2px; background:repeating-linear-gradient(90deg,var(--screen-line) 0 6px, transparent 6px 12px);}
  .char{width:72px;height:72px; transition:transform .2s; animation:idle 2.2s ease-in-out infinite; cursor:pointer; user-select:none; display:flex;align-items:center;justify-content:center; image-rendering:pixelated;}
  @keyframes idle{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-4px) rotate(1deg);}}
  .char.act{animation:hop .5s ease;}
  @keyframes hop{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-10px) scale(1.07);}60%{transform:translateY(0) scale(.95);}100%{transform:translateY(0) scale(1);}}
  .char.sad{animation:none; transform:translateY(2px); filter:drop-shadow(2px 3px 0 rgba(0,0,0,.12)) grayscale(.4);}
  .char.wander{animation:wander 4s ease-in-out;}
  @keyframes wander{0%{transform:translateX(0);}25%{transform:translateX(-28px) rotate(-2deg);}50%{transform:translateX(24px) rotate(2deg);}75%{transform:translateX(-12px);}100%{transform:translateX(0);}}
  .char.shiver{animation:shiver .3s linear 6;}
  @keyframes shiver{0%,100%{transform:translateX(0);}25%{transform:translateX(-3px) rotate(-3deg);}75%{transform:translateX(3px) rotate(3deg);}}
  .zzz{position:absolute; top:14px; right:30px; font-size:14px; color:var(--screen-line); animation:zzz 2.4s ease-in-out infinite;}
  @keyframes zzz{0%{opacity:0; transform:translateY(0);}40%{opacity:1;}100%{opacity:0; transform:translateY(-18px);}}
  .poop{position:absolute; bottom:18px; font-size:18px; animation:fadein .4s;}
  @keyframes fadein{from{opacity:0; transform:scale(0);}to{opacity:1; transform:scale(1);}}
  .speech{position:absolute; top:4px; left:50%; transform:translateX(-50%); background:#fff; border:2px solid var(--ink); border-radius:8px; padding:5px 9px; font-size:10px; max-width:230px; text-align:center; line-height:1.4; opacity:0; pointer-events:none; transition:opacity .3s; z-index:5;}
  .speech.show{opacity:1;}
  .speech::after{content:""; position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:var(--ink);}
  .flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:8;}
  .flash.go{animation:flashanim 1.2s ease;}
  @keyframes flashanim{0%{opacity:0;}20%{opacity:1;}100%{opacity:0;}}
  .flash.rare{background:radial-gradient(circle,#fff 0%, var(--gold) 60%, #ff8c00 100%);}
  .controls{display:flex; justify-content:space-around; margin-top:10px; padding:0 2px;}
  .btn{width:56px; height:44px; background:linear-gradient(180deg,#fff,var(--btn)); border:2px solid var(--btn-edge); border-radius:14px; font-family:'Mochiy Pop P One', sans-serif; font-size:10px; color:#333333; cursor:pointer; box-shadow:0 4px 0 var(--btn-edge), inset 0 2px 2px #fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; transition:transform .08s, box-shadow .08s;}
  .btn .ico{font-size:18px;}
  .btn:active{transform:translateY(4px); box-shadow:0 0 0 var(--btn-edge), inset 0 2px 2px #fff;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .dex-wrap{margin-top:8px;}
  .dex-toggle{width:130px; padding:7px; border:none; border-radius:12px; background:rgba(255,255,255,.85); color:#222222; font-family:'Mochiy Pop P One'; font-size:11px; cursor:pointer; box-shadow:0 3px 0 rgba(224,122,31,.3); display:block; margin:0 auto;}
  .dex{display:none; margin-top:10px; background:rgba(255,255,255,.82); border-radius:12px; padding:12px; color:var(--ink); max-height:340px; overflow-y:auto;}
  .dex.open{display:block;}
  .dex .dexhead{display:flex; justify-content:space-between; align-items:center; font-size:11px; margin-bottom:8px; color:var(--shell-edge);}
  .dex .prog{font-size:10px;}
  .tier{font-size:9px; color:var(--screen-line); margin:8px 0 4px; border-bottom:1px solid var(--btn-edge); padding-bottom:2px; letter-spacing:1px;}
  .grid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .cell{background:#fff; border:1px solid var(--btn-edge); border-radius:8px; padding:6px 2px; text-align:center; cursor:default; position:relative;}
  .cell .f{width:36px;height:36px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;overflow:hidden;}
  .cell .n{font-size:7px; color:#6a5; margin-top:2px; line-height:1.1; height:16px; overflow:hidden;}
  .cell.locked{opacity:.4;}
  .cell.locked .f{filter:grayscale(1) brightness(.5);}
  .cell.rare{border-color:var(--gold); box-shadow:0 0 0 2px var(--gold);}
  .cell.rare::after{content:"★"; position:absolute; top:-6px; right:-4px; font-size:12px; color:#ff8c00; text-shadow:0 0 2px #fff;}
  .cell.cur{border-color:var(--shell-edge); box-shadow:0 0 0 2px var(--shell-edge);}
  .tip{position:fixed; background:#111111; color:#ffffff; font-size:10px; padding:6px 9px; border-radius:8px; max-width:200px; z-index:99; pointer-events:none; opacity:0; transition:opacity .15s; line-height:1.4;}
  .tip.show{opacity:1;}
  .tip .q{display:block; color:var(--gold); margin-top:3px;}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#111111; color:#ffffff; padding:10px 18px; border-radius:20px; font-size:12px; opacity:0; transition:all .3s; z-index:50; max-width:300px; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.rare{background:linear-gradient(90deg,#ff8c00,#ffd700); color:#5a3a2a; font-weight:bold;}
  .ages{text-align:center; font-size:9px; color:var(--screen-line); padding-bottom:6px;}
  .dex-wrap-inner{margin-top:8px; text-align:center;}
  .dex-inner-btn{padding:7px 0; width:130px; border:none; border-radius:20px; background:rgba(255,255,255,.7); color:#555; font-family:'Mochiy Pop P One'; font-size:11px; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.15); transition:transform .1s, background .2s;}
  .dex-inner-btn:active{transform:scale(.97);}
  .dex-inner-btn.open{background:#333; color:#fff;}
  .dex-panel{position:absolute; inset:0; background:var(--screen-bg); overflow-y:auto; z-index:10; padding:4px; display:none;}
  .dex-panel-head{display:flex; justify-content:space-between; font-size:9px; color:var(--screen-line); padding:3px 6px 4px; border-bottom:1px solid var(--screen-line); font-family:'DotGothic16',monospace; letter-spacing:1px; margin-bottom:4px;}
  .dex-panel-body{display:grid; grid-template-columns:repeat(4,1fr); gap:3px; padding:2px;}
  .dex-tier{grid-column:1/-1; font-size:6px; color:var(--screen-line); padding:2px 0; border-bottom:1px dashed var(--screen-line); font-family:'DotGothic16',monospace; margin-top:2px;}
  .dex-cell{background:rgba(0,0,0,.06); border-radius:3px; padding:3px 1px; text-align:center;}
  .dex-cell.locked{opacity:.3;}
  .dex-cell .df{width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 1px;overflow:hidden;}
  .dex-cell .df svg{width:26px;height:26px;image-rendering:pixelated;}
  .dex-cell .dn{font-size:5.5px; color:var(--ink); line-height:1.1; font-family:'DotGothic16',monospace; word-break:break-all;}
  .dex-cell.rare-cell{outline:1px solid var(--screen-line);}
  .device-footer{display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:8px; width:100%;}
  .color-btns{display:flex; gap:12px;}
  .cbtn{width:34px; height:34px; border-radius:50%; border:3px solid rgba(0,0,0,.15); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:transform .15s, box-shadow .15s;}
  .cbtn:hover{transform:scale(1.15);}
  .cbtn.active{box-shadow:0 0 0 3px #555, 0 0 0 5px rgba(0,0,0,.12); transform:scale(1.1);}
  .c-tamago{background:radial-gradient(circle at 35% 30%, #ffe680, #ffb347);}
  .c-kaeru{background:radial-gradient(circle at 35% 30%, #b8f0ff, #38c0e0);}
  .c-sim{background:radial-gradient(circle at 35% 30%, #555, #111);}
  .dex-outer-btn{padding:8px 32px; border:2px solid rgba(0,0,0,.15); border-radius:20px; background:#fff; color:#555; font-family:'Mochiy Pop P One'; font-size:12px; cursor:pointer; box-shadow:0 3px 8px rgba(0,0,0,.15); transition:transform .1s, background .2s;}
  .dex-outer-btn:active{transform:scale(.97);}
  .dex-outer-btn.open{background:#333; color:#fff; border-color:#333;}
  .reset{position:absolute; top:10px; right:14px; font-size:9px; background:rgba(255,255,255,.15); border:none; border-radius:8px; padding:3px 7px; cursor:pointer; color:#ffffff; font-family:'Mochiy Pop P One';}
  .theme-btns{position:absolute; top:10px; left:14px; display:flex; gap:5px;}
  .tbtn{width:18px; height:18px; border-radius:50%; border:2px solid rgba(255,255,255,.6); cursor:pointer; transition:transform .15s, border-color .15s;}
  .tbtn:hover{transform:scale(1.2);}
  .tbtn.active{border-color:#fff; box-shadow:0 0 0 2px rgba(255,255,255,.5);}
  .tbtn.t-tamago{background:radial-gradient(circle at 35% 30%, #ffe680, #ffb347);}
  .tbtn.t-kaeru{background:radial-gradient(circle at 35% 30%, #b8f0ff, #4ec9e0);}
  .tbtn.t-sim{background:radial-gradient(circle at 35% 30%, #555, #111);}
</style>
</head>
<body>
  <span class="deco" style="top:8%; left:8%;">🌻</span>
  <span class="deco" style="top:16%; right:10%; animation-delay:1s;">🐸</span>
  <span class="deco" style="bottom:12%; left:12%; animation-delay:2s;">🛼</span>
  <span class="deco" style="bottom:18%; right:8%; animation-delay:.5s;">✨</span>
  <div class="device-wrapper">
  <div class="device">
    <button class="reset" id="resetBtn">↺ リセット</button>
    <div class="antenna"></div>
    <div class="bezel">
      <div class="screen">
        <div class="flash" id="flash"></div>
        <div class="stats">
          <div class="stat"><div class="lbl"><span>🍙はらへり</span><span id="hungerN">100</span></div><div class="bar" id="hungerBar"><span style="width:100%"></span></div></div>
          <div class="stat"><div class="lbl"><span>💗ごきげん</span><span id="moodN">100</span></div><div class="bar" id="moodBar"><span style="width:100%"></span></div></div>
          <div class="stat"><div class="lbl"><span>🕊じゆう</span><span id="energyN">100</span></div><div class="bar" id="energyBar"><span style="width:100%"></span></div></div>
        </div>
        <div class="stage-tag" id="stageTag">たまご期</div>
        <div class="stage">
          <div class="speech" id="speech"></div>
          <div class="zzz" id="zzz" style="display:none;">Z z</div>
          <div class="char" id="char" title="なでる">🥚</div>
          <span class="poop" id="poop" style="display:none; left:60%;">💩</span>
          <div class="floor"></div>
        </div>
        <div class="ages">経過 <span id="ageMin">0</span>分 / なでた <span id="petCount">0</span>回</div>
        <div class="dex-panel" id="dexPanel" style="display:none;">
          <div class="dex-panel-head">さちよ図鑑 <span class="prog" id="prog">0/0</span></div>
          <div class="dex-panel-body" id="dexBody"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="btnFeed"><span class="ico">🍙</span>ごはん</button>
      <button class="btn" id="btnPlay"><span class="ico">🛼</span>あそぶ</button>
      <button class="btn" id="btnSleep"><span class="ico">😴</span>ねかす</button>
      <button class="btn" id="btnClean"><span class="ico">🧹</span>そうじ</button>
    </div>
    <div class="dex-wrap-inner">
      <button class="dex-inner-btn" id="dexToggle">さちよ図鑑</button>
    </div>
  </div>
  <div class="device-footer">
    <div class="color-btns">
      <button class="cbtn c-tamago active" id="tTamago" title="たまご">🥚</button>
      <button class="cbtn c-kaeru" id="tKaeru" title="けえる">🐸</button>
      <button class="cbtn c-sim" id="tSim" title="SiM">🖤</button>
    </div>
  </div>
  </div>
  <div class="tip" id="tip"></div>
  <div class="toast" id="toast"></div>

  function applyTheme(name) {
    const t = THEMES[name];
    const root = document.documentElement;
    // CSS変数
    Object.entries(t).forEach(([k,v])=>{ if(k.startsWith('--')) root.style.setProperty(k,v); });
    // bezel
    const bezelEl = document.querySelector('.bezel');
    if(bezelEl) bezelEl.style.background = t.bezel;
    // タイトル（::before は直接変更不可のため device の data属性で代替）
    const dev = document.querySelector('.device');
    if(dev){ dev.style.setProperty('--title-color', t.titleColor); }
    // アンテナ光
    const ant = document.querySelector('.antenna::after');
    // antenna after は直接操作できないのでstyleタグを動的に更新
    let styleTag = document.getElementById('dynamic-theme');
    if(!styleTag){ styleTag=document.createElement('style'); styleTag.id='dynamic-theme'; document.head.appendChild(styleTag); }
    styleTag.textContent = `
      .antenna::after{ background:${t.antennaBg}!important; box-shadow:${t.antennaGlow}!important; }
      .device::before{ color:${t.titleColor}!important; text-shadow:${t.titleShadow}!important; }
      .reset{ color:${t.resetColor}!important; }
      .btn{ color:${t.btnColor}!important; }
      .dex-toggle{ background:${t.dexBg}!important; color:${t.dexColor}!important; }
    `;
    // アクティブボタン更新
    document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
    document.getElementById('t'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
  }

    zzz.style.display=state.sleeping?'block':'none'; poop.style.display=state.dirty?'block':'none';

    $('btnFeed').disabled=state.sleeping||state.id==='egg';
    $('btnPlay').disabled=state.sleeping||state.id==='egg';
    $('btnClean').disabled=state.id==='egg'||!state.dirty;
    $('prog').textContent=dexCount()+' / '+TOTAL;
    renderDex();

  function sleepToggle(){ if(state.id==='egg')return;
    state.sleeping=!state.sleeping;
    if(state.sleeping) say(Math.random()<0.5?Q.nezzo:Q.nemui);
    else { state.energy=Math.min(100,state.energy+28); say('ふぁ〜 よう寝た'); state.sleep++; state.care+=1; }
    render(); }
  function clean(){ if($('btnClean').disabled)return; say(Q.kusse); state.dirty=false; state.clean++; state.mood=Math.min(100,state.mood+8); state.care+=2; render(); }
  function pet(){ state.pet++;
    if(state.id==='egg'){ hop(); if(state.pet>=5) tryEvolve(true); else say(['コトッ','ぴくっ',Q.nezzo,Q.nemui][state.pet%4]); render(); return; }
    state.mood=Math.min(100,state.mood+5);
    const r=Math.random();
    if(r<0.22){ shiver(); say(Q.itete); }
    else if(r<0.45){ wander(); say(Q.fun); }
    else { hop(); say(Math.random()<0.4?Q.kawaee:rl()); }
    tryEvolve(true); render(); }

  function ctx(){ return Object.assign({}, state, { dexCount:dexCount() }); }
  function evolveTo(id){
    const c=C[id]; state.id=id;
    const isNew=!state.unlocked[id]; state.unlocked[id]=true;
    flash.classList.remove('go','rare'); void flash.offsetWidth;
    if(c.rare) flash.classList.add('rare');
    flash.classList.add('go');
    setTimeout(()=>{ toast((c.rare?'🌟 レア進化！ ':'🎉 進化！ ')+c.name, c.rare); say(c.lines[Math.min(1,c.lines.length-1)]); },500);
    render();
  }
  function tryEvolve(force){
    const rules=EVO[state.id]; if(!rules) return;
    const s=ctx();
    for(const r of rules){ if(r.c(s)){ evolveTo(r.to); return; } }
  }

    function renderDex(){
    const total=Object.keys(C).length;
    const found=Object.keys(state.unlocked).length;
    $('prog').textContent=found+'/'+total;
    let h='';
    for(const grp of DEX_ORDER){
      h+='<div class="dex-tier">'+grp.t+'</div>';
      for(const id of grp.ids){
        const c=C[id]; const open=!!state.unlocked[id]; const cur=state.id===id;
        const cls='dex-cell'+(open?'':' locked')+(c.rare?' rare-cell':'')+(cur?' cur-cell':'');
        const face=open?(DOTS_SVG[id]||''):'<span style="font-size:18px;line-height:1">❔</span>';
        const nm=open?c.name.replace('さちよ','さち'):'？';
        h+='<div class="'+cls+'" title="'+(open?c.desc:'')+'"><div class="df">'+face+'</div><div class="dn">'+nm+'</div></div>';
      }
    }
    $('dexBody').innerHTML=h;
  }
  // tooltip
  const tip=$('tip');



  // タップでも説明（モバイル）


  function tick(){
    state.age++;
    if(state.id!=='egg'){
      if(state.sleeping){ state.energy=Math.min(100,state.energy+1.2); state.hunger=Math.max(0,state.hunger-0.15); state.sleepSec++; }
      else{
        state.hunger=Math.max(0,state.hunger-0.5); state.energy=Math.max(0,state.energy-0.3);
        let md=0.26; if(state.hunger<30)md+=0.5; if(state.energy<30)md+=0.35; if(state.dirty)md+=0.6;
        state.mood=Math.max(0,state.mood-md);
      }
      if(!state.dirty&&Math.random()<0.015) state.dirty=true;
      if(!state.sleeping&&!speech.classList.contains('show')){
        if(state.dirty&&Math.random()<0.04) say(Q.kusse);
        else if(Math.random()<0.05) say(rl());
        if(Math.random()<0.02) wander();
      }
      if(state.mood<=0&&state.hunger<=0){ state.neglect++; state.neglectTotal++; }
      else state.neglect=0;
    }
    tryEvolve(false);
    render();
  }

  $('tTamago').onclick=()=>{ applyTheme('tamago'); document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active')); $('tTamago').classList.add('active'); };
  $('tKaeru').onclick=()=>{ applyTheme('kaeru'); document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active')); $('tKaeru').classList.add('active'); };
  $('tSim').onclick=()=>{ applyTheme('sim'); document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active')); $('tSim').classList.add('active'); };
  applyTheme('tamago');
  $('btnFeed').onclick=feed; $('btnPlay').onclick=play; $('btnSleep').onclick=sleepToggle; $('btnClean').onclick=clean; char.onclick=pet;
  $('dexToggle').onclick=()=>{
    const panel=$('dexPanel');
    const btn=$('dexToggle');
    const isOpen=panel.style.display==='block';
    panel.style.display=isOpen?'none':'block';
    btn.classList.toggle('open',!isOpen);
    btn.textContent=isOpen?'さちよ図鑑':'✕ とじる';
    if(!isOpen) renderDex();
  };
  $('resetBtn').onclick=()=>{
    resetCount++;
    const keep=state.unlocked; // 図鑑は引き継ぐ
    state=fresh(); state.unlocked=keep; state.unlocked.egg=true;
    if(resetCount>=3 && !state.unlocked.robo){ /* 3回リセットでロボ解禁の伏線 */ }
    if(resetCount>=3){ state.unlocked.robo=true; toast('🤖 何度もやり直す者の前に…ロボさちよ解禁！',true); }
    say(Q.nezzo); render();
  };

  render(); toast('🥚 たまごを5回なでて かえそう！'); say(Q.nezzo);
  setInterval(tick,1000);
})();
</script>
</body>
